server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /www/retrohubconnect/public;  # Chemin adapté pour RetroHubConnect

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    index index.php index.html index.htm;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache des fichiers statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?|ttf|eot|svg)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform";
    }

    # Ignorer les logs pour favicon.ico et robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Gestion des erreurs 404
    error_page 404 /index.php;

    # Configuration PHP-FPM (port 9000 par défaut)
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;  # Port par défaut pour PHP-FPM
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Interdire l'accès aux fichiers sensibles
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}